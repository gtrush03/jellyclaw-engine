<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jellyclaw</title>
    <style>
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
        background: #1a1a1a;
        color: #fff;
      }
      #app {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        padding: 20px;
        box-sizing: border-box;
      }
      h1 {
        font-size: 2rem;
        margin-bottom: 1rem;
      }
      .status {
        padding: 10px 20px;
        border-radius: 8px;
        background: #2a2a2a;
        margin-bottom: 1rem;
      }
      .status.connected {
        background: #1a4a1a;
      }
      .status.error {
        background: #4a1a1a;
      }
      button {
        padding: 10px 20px;
        font-size: 1rem;
        border: none;
        border-radius: 8px;
        background: #4a90d9;
        color: #fff;
        cursor: pointer;
      }
      button:hover {
        background: #5aa0e9;
      }
      button:disabled {
        background: #3a3a3a;
        cursor: not-allowed;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <h1>🪼 Jellyclaw</h1>
      <div id="status" class="status">Initializing...</div>
      <button id="connect" disabled>Connect to Engine</button>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
