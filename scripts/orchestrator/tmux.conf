# tmux.conf — optional keybindings for jc-orchestrator.
# Source this from your ~/.tmux.conf:
#   source-file /path/to/jellyclaw-engine/scripts/orchestrator/tmux.conf
#
# Or copy the bindings below directly.

# -- navigation -------------------------------------------------------------
# prefix-G  → grid  (window 0)
# prefix-L  → logs  (window 1)
# prefix-R  → repl  (window 2)
# prefix-B  → brain (window 3)
# prefix-I  → inbox (window 4)
bind-key G select-window -t jc-orchestrator:0
bind-key L select-window -t jc-orchestrator:1
bind-key R select-window -t jc-orchestrator:2
bind-key B select-window -t jc-orchestrator:3
bind-key I select-window -t jc-orchestrator:4

# -- quick actions ----------------------------------------------------------
# prefix-P  → pause the rig
# prefix-U  → resume ("unpause")
# prefix-H  → halt
bind-key P run-shell 'jc pause'
bind-key U run-shell 'jc resume'
bind-key H run-shell 'jc halt'

# -- cosmetic ---------------------------------------------------------------
# Obsidian & gold theme (subtle — only applies if you source this file).
set-option -g status-style          'bg=colour235,fg=colour179'
set-option -g window-status-current-style 'bg=colour179,fg=colour232,bold'
set-option -g pane-border-style     'fg=colour238'
set-option -g pane-active-border-style 'fg=colour179'
